<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BCM Production Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  :root {
    --bg:#0d0f14; --panel:#13161e; --border:#1e2330;
    --accent:#259b24; --purple:#673ab7; --pink:#f48fb1;
    --text:#e8eaf0; --muted:#5a6070;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--bg);color:var(--text);
    font-family:'Barlow',sans-serif;min-height:100vh;padding:22px 28px;
    background-image:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(37,155,36,.07) 0%,transparent 70%);
  }

  /* ── Header ─────────────────────────────── */
  header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:12px}
  .header-left h1{font-size:1.75rem;font-weight:900;letter-spacing:-.5px;color:#fff;line-height:1}
  .header-left h1 span{color:var(--accent)}
  .header-left p{font-family:'Share Tech Mono',monospace;font-size:.67rem;color:var(--muted);margin-top:5px;letter-spacing:1.5px;text-transform:uppercase}

  /* ── Controls ────────────────────────────── */
  .controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .ctrl-label{font-family:'Share Tech Mono',monospace;font-size:.67rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase;white-space:nowrap}
  .date-select{
    background:var(--panel);border:1px solid var(--border);border-radius:8px;
    color:var(--accent);font-family:'Share Tech Mono',monospace;font-size:.82rem;
    padding:8px 13px;cursor:pointer;outline:none;min-width:145px;letter-spacing:.5px;
    transition:border-color .2s;
  }
  .date-select:hover,.date-select:focus{border-color:var(--accent)}
  .date-select option{background:#1a1f2b;color:var(--text)}
  .btn-nav{
    background:var(--panel);border:1px solid var(--border);border-radius:8px;
    color:var(--muted);font-size:1.1rem;width:34px;height:34px;
    cursor:pointer;display:flex;align-items:center;justify-content:center;
    transition:border-color .2s,color .2s;
  }
  .btn-nav:hover{border-color:var(--accent);color:var(--accent)}
  .btn-nav:disabled{opacity:.22;cursor:not-allowed}
  .btn-refresh{
    background:var(--panel);border:1px solid var(--border);border-radius:8px;
    color:var(--muted);font-size:.73rem;font-family:'Share Tech Mono',monospace;
    padding:7px 12px;cursor:pointer;letter-spacing:.5px;
    transition:border-color .2s,color .2s;white-space:nowrap;
  }
  .btn-refresh:hover{border-color:var(--accent);color:var(--accent)}

  /* ── Error banner ────────────────────────── */
  #errorBanner{
    display:none;background:rgba(220,50,50,.12);border:1px solid rgba(220,50,50,.35);
    border-radius:9px;padding:11px 16px;margin-bottom:14px;
    font-size:.78rem;color:#ffb3b3;line-height:1.6;
  }
  #errorBanner code{background:rgba(255,255,255,.08);border-radius:4px;padding:1px 6px;font-family:'Share Tech Mono',monospace;font-size:.74rem;color:#f48fb1}

  /* ── Legend ──────────────────────────────── */
  .legend{display:flex;gap:18px;margin-bottom:13px;flex-wrap:wrap}
  .legend-item{display:flex;align-items:center;gap:7px;font-size:.78rem;font-weight:600}
  .legend-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}

  /* ── Chart ───────────────────────────────── */
  .chart-wrapper{
    background:var(--panel);border:1px solid var(--border);border-radius:14px;
    padding:26px 18px 18px;position:relative;overflow:hidden;
  }
  .chart-wrapper::before{
    content:'';position:absolute;top:0;left:0;right:0;height:2px;
    background:linear-gradient(90deg,var(--accent),var(--purple),var(--pink));
    border-radius:14px 14px 0 0;
  }
  canvas{display:block;width:100%!important}

  /* ── Overlay ─────────────────────────────── */
  .overlay{
    position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    background:rgba(13,15,20,.88);border-radius:14px;gap:11px;z-index:10;
  }
  .overlay.hidden{display:none}
  .spinner{
    width:32px;height:32px;border:3px solid var(--border);
    border-top-color:var(--accent);border-radius:50%;
    animation:spin .75s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  .overlay-msg{font-family:'Share Tech Mono',monospace;font-size:.71rem;color:var(--muted);letter-spacing:1px;text-align:center;padding:0 16px}

  /* ── Stats ───────────────────────────────── */
  .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:14px}
  .stat-card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:15px 17px;position:relative;overflow:hidden}
  .stat-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px}
  .stat-card.green::after{background:var(--accent)}
  .stat-card.purple::after{background:var(--purple)}
  .stat-card.pink::after{background:var(--pink)}
  .stat-label{font-family:'Share Tech Mono',monospace;font-size:.61rem;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:6px}
  .stat-value{font-size:1.55rem;font-weight:900;letter-spacing:-1px;line-height:1}
  .stat-card.green  .stat-value{color:var(--accent)}
  .stat-card.purple .stat-value{color:var(--purple)}
  .stat-card.pink   .stat-value{color:var(--pink)}
  .stat-sub{font-size:.68rem;color:var(--muted);margin-top:3px}

  .footer-row{display:flex;justify-content:space-between;align-items:center;margin-top:10px;flex-wrap:wrap;gap:8px}
  .last-update{font-family:'Share Tech Mono',monospace;font-size:.61rem;color:var(--muted);letter-spacing:.4px}
  .row-count{font-family:'Share Tech Mono',monospace;font-size:.61rem;color:var(--muted);letter-spacing:.4px}

  @media(max-width:640px){
    body{padding:12px}
    .stats-row{grid-template-columns:1fr}
    .header-left h1{font-size:1.3rem}
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>BCM <span>Production</span> Dashboard</h1>
    <p>Data 1 · Machine Production Per Hour</p>
  </div>
  <div class="controls">
    <span class="ctrl-label">Working Date</span>
    <button class="btn-nav" id="btnPrev" disabled>&#8249;</button>
    <select class="date-select" id="datePicker"><option>Loading…</option></select>
    <button class="btn-nav" id="btnNext" disabled>&#8250;</button>
    <button class="btn-refresh" id="btnRefresh">⟳ Refresh</button>
  </div>
</header>

<div id="errorBanner"></div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#259b24"></div>CR</div>
  <div class="legend-item"><div class="legend-dot" style="background:#673ab7"></div>BWE 1</div>
  <div class="legend-item"><div class="legend-dot" style="background:#f48fb1"></div>BWE 2</div>
</div>

<div class="chart-wrapper">
  <div class="overlay" id="overlay">
    <div class="spinner"></div>
    <div class="overlay-msg" id="overlayMsg">LOADING DATA…</div>
  </div>
  <canvas id="bcmChart" height="370"></canvas>
</div>

<div class="stats-row">
  <div class="stat-card green">
    <div class="stat-label">BCM CR — Total</div>
    <div class="stat-value" id="totalB">—</div>
    <div class="stat-sub"  id="subB">Column B</div>
  </div>
  <div class="stat-card purple">
    <div class="stat-label">BWE 1 — Total</div>
    <div class="stat-value" id="totalH">—</div>
    <div class="stat-sub"  id="subH">Column H</div>
  </div>
  <div class="stat-card pink">
    <div class="stat-label">BWE 2 — Total</div>
    <div class="stat-value" id="totalI">—</div>
    <div class="stat-sub"  id="subI">Column I</div>
  </div>
</div>

<div class="footer-row">
  <div class="row-count"  id="rowCount"></div>
  <div class="last-update" id="lastUpdate"></div>
</div>

<script>
/* ═══════════════════════════════════════════════════════
   CONFIG
   ═══════════════════════════════════════════════════════
   CSV_URLS: ลองทีละ URL ถ้า URL แรก error ก็ลอง URL ถัดไป
   gid=0   → sheet แรก (ถ้า Data 1 เป็น sheet แรก)
   gid=ตัวเลขอื่น → ดูจาก URL ของ Google Sheet เมื่อเปิด tab Data 1
   ═══════════════════════════════════════════════════════ */
const BASE = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQrCQ3IiMeLNYcvQ-17DHRwXFGJ-giDOeBZ805WbjMJcVjL8OrKt7XspFq-Zf8VLWmLynA0vHBWYvJ8/pub';
const CSV_URLS = [
  BASE + '?gid=1971585139&single=true&output=csv',  // Data 1 tab
  BASE + '?gid=0&single=true&output=csv',
  BASE + '?output=csv',
];

/*
  Column index (0-based) — ตรงกับภาพ:
  A=0  Date Time
  B=1  BCM CR
  C=2  Crusher 30
  D=3  Crusher 31
  E=4  Crusher 32
  F=5  Shift
  G=6  Working Date   ← ใช้ filter วันที่
  H=7  BWE 1
  I=8  BWE 2
*/
const COL = { DT:0, BCM_CR:1, WDATE:6, BWE1:7, BWE2:8 };

/* ═══════════════════════════════════════════════════════ */

let allRows=[], availableDates=[], bcmChart=null;

/* ── Chart.js ──────────────────────────────────────────── */
Chart.defaults.color='#5a6070';
Chart.defaults.font.family="'Barlow',sans-serif";

const totalLabelPlugin={
  id:'totalLabel',
  afterDatasetsDraw(chart){
    const{ctx,scales:{x,y}}=chart;
    const ds=chart.data.datasets;
    ctx.save();
    chart.data.labels.forEach((_,i)=>{
      const total=ds.reduce((s,d)=>s+(Number(d.data[i])||0),0);
      if(!total)return;
      const xp=x.getPixelForValue(i), yp=y.getPixelForValue(total);
      const lbl=total.toLocaleString();
      ctx.font="bold 11px 'Share Tech Mono',monospace";
      const tw=ctx.measureText(lbl).width;
      const pw=tw+10,ph=16,px=xp-pw/2,py=yp-ph-4;
      ctx.fillStyle='rgba(18,22,34,.92)';
      ctx.beginPath();ctx.roundRect(px,py,pw,ph,4);ctx.fill();
      ctx.fillStyle='#e8eaf0';ctx.textAlign='center';ctx.textBaseline='bottom';
      ctx.fillText(lbl,xp,yp-5);
    });
    ctx.restore();
  }
};

function initChart(){
  const ctx=document.getElementById('bcmChart').getContext('2d');
  bcmChart=new Chart(ctx,{
    type:'bar',plugins:[totalLabelPlugin],
    data:{labels:[],datasets:[
      {label:'BCM CR (Col B)',data:[],backgroundColor:'rgba(37,155,36,.88)', stack:'s'},
      {label:'BWE 1 (Col H)', data:[],backgroundColor:'rgba(103,58,183,.88)',stack:'s'},
      {label:'BWE 2 (Col I)', data:[],backgroundColor:'rgba(244,143,177,.88)',stack:'s'},
    ]},
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      layout:{padding:{top:34}},
      plugins:{
        legend:{display:false},
        tooltip:{
          backgroundColor:'#1a1f2b',borderColor:'#2a3040',borderWidth:1,
          titleFont:{family:"'Share Tech Mono',monospace",size:11},
          bodyFont:{family:"'Barlow',sans-serif",size:12},padding:12,
          callbacks:{
            label:c=>` ${c.dataset.label}: ${c.parsed.y.toLocaleString()}`,
            footer:items=>`  Total: ${items.reduce((s,i)=>s+i.parsed.y,0).toLocaleString()}`
          }
        }
      },
      scales:{
        x:{stacked:true,grid:{color:'#1a1f2b'},
           ticks:{font:{family:"'Share Tech Mono',monospace",size:10},color:'#5a6070',maxRotation:45,minRotation:30}},
        y:{stacked:true,grid:{color:'#1a1f2b'},
           ticks:{font:{family:"'Share Tech Mono',monospace",size:10},color:'#5a6070',callback:v=>v.toLocaleString()},
           beginAtZero:true}
      }
    }
  });
}

/* ── Fetch CSV (try multiple URLs) ─────────────────────── */
async function fetchData(){
  showOverlay('LOADING DATA…');
  hideError();
  let lastErr='';
  for(const url of CSV_URLS){
    try{
      const res=await fetch(url+'&_cb='+Date.now());
      if(!res.ok){lastErr=`HTTP ${res.status}`;continue;}
      const text=await res.text();
      if(!text||text.trim().length<10){lastErr='Empty response';continue;}
      processCSV(text,url);
      return;
    }catch(e){lastErr=e.message;}
  }
  showOverlay('โหลดข้อมูลไม่สำเร็จ');
  showError(`ไม่สามารถดึงข้อมูลได้: ${lastErr}<br>ตรวจสอบว่า Google Sheet ถูก Publish เป็น CSV แล้ว`);
}

function processCSV(text, usedUrl){
  const parsed=Papa.parse(text,{skipEmptyLines:true});
  const rows=parsed.data;

  const header=rows[0]||[];
  console.log('Header:', header);
  console.log('Row 1:', rows[1]);

  // กรองเอาเฉพาะ row ที่ Col A มีวันที่+เวลาจริง (ไม่ใช่ header ซ้ำหรือแถวว่าง)
  allRows=rows.slice(1).filter(r=>{
    const dt=(r[COL.DT]||'').trim();
    if(!dt||dt.toLowerCase().includes('date')||dt.toLowerCase().includes('time')) return false;
    const parsed=parseDT(dt);
    return parsed && !isNaN(parsed);
  });  /*
    คำนวณ Working Date จาก Col A (Date Time) โดยตรง:
      ชั่วโมง >= 8  →  Working Date = วันนั้น
      ชั่วโมง 0–7  →  Working Date = วันก่อนหน้า 1 วัน
    เช่น 2026-03-05 00:00 → Working Date = 2026-03-04
         2026-03-05 08:00 → Working Date = 2026-03-05
  */
  function getWorkingDate(dtStr){
    const d=parseDT(dtStr);
    if(!d||isNaN(d))return null;
    const h=d.getHours();
    if(h<8){
      // ย้อนไปวันก่อนหน้า
      const prev=new Date(d);
      prev.setDate(prev.getDate()-1);
      return toYMD(prev);
    }
    return toYMD(d);
  }

  function toYMD(d){
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  // ติด working date ให้แต่ละ row
  allRows.forEach(r=>{ r._wd=getWorkingDate(r[COL.DT]||''); });
  allRows=allRows.filter(r=>r._wd);

  // Unique working dates
  const dateSet=new Set(allRows.map(r=>r._wd));
  availableDates=[...dateSet].sort();

  if(availableDates.length===0){
    showOverlay('ไม่พบข้อมูลใน Column A');
    showError(`พบ ${allRows.length} แถว แต่ไม่สามารถอ่านวันที่จาก Column A ได้<br>
      Header: <code>${header.slice(0,5).join(' | ')}</code><br>
      แถวแรก: <code>${(rows[1]||[]).slice(0,5).join(' | ')}</code>`);
    return;
  }

  buildPicker();
  renderForDate(availableDates[availableDates.length-1]);

  const now=new Date();
  document.getElementById('lastUpdate').textContent=
    `Updated: ${now.toLocaleDateString('en-GB')} ${now.toLocaleTimeString('en-GB')}`;
  document.getElementById('rowCount').textContent=
    `${allRows.length} rows · ${availableDates.length} dates`;
}

/* ── Date parsing (handles YYYY-MM-DD, DD/MM/YYYY, M/D/YYYY etc.) ─ */
function parseFlexDate(s){
  s=(s||'').trim();
  let d=new Date(s);
  if(!isNaN(d))return d;
  // DD/MM/YYYY or D/M/YYYY
  const m=s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
  if(m)return new Date(`${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`);
  return new Date(0);
}

function toDisplay(s){
  const d=parseFlexDate(s);
  if(isNaN(d))return s;
  return `${String(d.getDate()).padStart(2,'0')}-${String(d.getMonth()+1).padStart(2,'0')}-${d.getFullYear()}`;
}

/* ── Parse datetime จาก Col A ─────────────────────────────
   Format จริง: "2026-03-06 8:00"  (YYYY-MM-DD H:MM)
   ─────────────────────────────────────────────────────── */
function parseDT(s){
  s=(s||'').trim();
  if(!s) return new Date(NaN);

  // ① "2026-03-06 8:00"  or  "2026-03-06 08:00:00"
  let m=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})[T ](\d{1,2}):(\d{2})/);
  if(m) return new Date(+m[1], +m[2]-1, +m[3], +m[4], +m[5], 0);

  // ② "22/3/2026, 17:00:00"  DD/MM/YYYY, H:MM:SS
  m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})[,\s]+(\d{1,2}):(\d{2})/);
  if(m) return new Date(+m[3], +m[2]-1, +m[1], +m[4], +m[5], 0);

  return new Date(NaN);
}

function fmtTime(s){
  const d=parseDT(s);
  if(!d||isNaN(d)) return s;
  return `${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
}

/* ── Build date picker ──────────────────────────────────── */
function buildPicker(){
  const sel=document.getElementById('datePicker');
  sel.innerHTML='';
  availableDates.forEach(d=>{
    const o=document.createElement('option');
    o.value=d;
    // d = YYYY-MM-DD → แสดง DD-MM-YYYY
    const parts=d.split('-');
    o.textContent=parts.length===3?`${parts[2]}-${parts[1]}-${parts[0]}`:d;
    sel.appendChild(o);
  });
  sel.value=availableDates[availableDates.length-1];
  syncNav();
}

/* ── Render chart ───────────────────────────────────────── */
function renderForDate(wd){
  /*
    Filter ด้วย _wd ที่คำนวณจาก Col A
    Sort: ชั่วโมง 8–23 ก่อน, 0–7 หลัง
  */
  function shiftHour(r){
    const h=parseDT(r[COL.DT]).getHours();
    return h<8 ? h+24 : h;
  }

  const rows=allRows
    .filter(r=>r._wd===wd)
    .sort((a,b)=>shiftHour(a)-shiftHour(b));

  // parse ตัวเลขที่อาจมี comma คั่นหลักพัน เช่น "2,385" → 2385
  function parseNum(v){ return parseFloat((v||'0').replace(/,/g,''))||0; }

  const labels=rows.map(r=>fmtTime(r[COL.DT]||''));
  const dataB =rows.map(r=>parseNum(r[COL.BCM_CR]));
  const dataH =rows.map(r=>parseNum(r[COL.BWE1]));
  const dataI =rows.map(r=>parseNum(r[COL.BWE2]));

  bcmChart.data.labels           =labels;
  bcmChart.data.datasets[0].data =dataB;
  bcmChart.data.datasets[1].data =dataH;
  bcmChart.data.datasets[2].data =dataI;
  bcmChart.update();

  const sum=a=>a.reduce((s,v)=>s+v,0);
  const disp=toDisplay(wd);
  document.getElementById('totalB').textContent=sum(dataB).toLocaleString();
  document.getElementById('totalH').textContent=sum(dataH).toLocaleString();
  document.getElementById('totalI').textContent=sum(dataI).toLocaleString();
  document.getElementById('subB').textContent=`Column B · ${disp}`;
  document.getElementById('subH').textContent=`Column H · ${disp}`;
  document.getElementById('subI').textContent=`Column I · ${disp}`;

  document.getElementById('rowCount').textContent=
    `${rows.length} rows · ${availableDates.length} dates · ${disp}`;

  hideOverlay(); syncNav();
}

/* ── Nav ────────────────────────────────────────────────── */
function syncNav(){
  const idx=availableDates.indexOf(document.getElementById('datePicker').value);
  document.getElementById('btnPrev').disabled=idx<=0;
  document.getElementById('btnNext').disabled=idx>=availableDates.length-1;
}
document.getElementById('datePicker').addEventListener('change',e=>renderForDate(e.target.value));
document.getElementById('btnPrev').addEventListener('click',()=>{
  const sel=document.getElementById('datePicker');
  const idx=availableDates.indexOf(sel.value);
  if(idx>0){sel.value=availableDates[idx-1];renderForDate(sel.value);}
});
document.getElementById('btnNext').addEventListener('click',()=>{
  const sel=document.getElementById('datePicker');
  const idx=availableDates.indexOf(sel.value);
  if(idx<availableDates.length-1){sel.value=availableDates[idx+1];renderForDate(sel.value);}
});
document.getElementById('btnRefresh').addEventListener('click',fetchData);

/* ── Overlay / Error helpers ────────────────────────────── */
function showOverlay(msg){
  document.getElementById('overlayMsg').textContent=msg;
  document.getElementById('overlay').classList.remove('hidden');
}
function hideOverlay(){document.getElementById('overlay').classList.add('hidden');}
function showError(html){
  const b=document.getElementById('errorBanner');
  b.innerHTML='⚠️ '+html; b.style.display='block';
}
function hideError(){document.getElementById('errorBanner').style.display='none';}

/* ── Boot ───────────────────────────────────────────────── */
initChart();
fetchData();
</script>
</body>
</html>
