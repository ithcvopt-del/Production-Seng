<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BCM Production Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700;800&family=Chakra+Petch:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  :root {
    --bg: #f0f2f5;
    --card: #ffffff;
    --border: #dde1e8;
    --shadow: 0 2px 12px rgba(0,0,0,.07);

    --green:  #2e7d32;
    --green2: #43a047;
    --green3: #81c784;
    --pink:   #e91e8c;
    --pink2:  #f48fb1;
    --purple: #7b1fa2;
    --blue:   #1565c0;

    --text:   #1a1f2e;
    --muted:  #6b7280;
    --label:  #374151;

    --header-bg: #1a237e;
    --header-accent: #42a5f5;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Sarabun', sans-serif;
    min-height: 100vh;
    padding: 0;
  }

  /* ── Top Header Bar ── */
  .top-bar {
    background: linear-gradient(135deg, #1a237e 0%, #283593 60%, #1565c0 100%);
    padding: 12px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
    box-shadow: 0 3px 16px rgba(21,35,126,.35);
  }

  .top-bar-left { display: flex; align-items: center; gap: 16px; }

  .logo-box {
    background: rgba(255,255,255,.12);
    border: 1px solid rgba(255,255,255,.2);
    border-radius: 8px;
    padding: 6px 14px;
    font-family: 'Chakra Petch', sans-serif;
    font-size: 1.3rem;
    font-weight: 700;
    color: #fff;
    letter-spacing: 1px;
  }
  .logo-box span { color: var(--header-accent); }

  .top-title {
    font-family: 'Chakra Petch', sans-serif;
    font-size: .95rem;
    font-weight: 600;
    color: rgba(255,255,255,.85);
    letter-spacing: .5px;
  }
  .top-title small {
    display: block;
    font-family: 'Sarabun', sans-serif;
    font-size: .72rem;
    color: rgba(255,255,255,.5);
    font-weight: 400;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 1px;
  }

  /* ── Controls ── */
  .controls {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .ctrl-label {
    font-family: 'Chakra Petch', sans-serif;
    font-size: .68rem; color: rgba(255,255,255,.6);
    letter-spacing: 1.5px; text-transform: uppercase; white-space: nowrap;
  }
  .date-select {
    background: rgba(255,255,255,.1);
    border: 1px solid rgba(255,255,255,.25);
    border-radius: 7px;
    color: #fff;
    font-family: 'Chakra Petch', monospace;
    font-size: .82rem;
    padding: 7px 13px;
    cursor: pointer; outline: none;
    min-width: 145px; letter-spacing: .5px;
    transition: background .2s, border-color .2s;
    -webkit-appearance: none;
  }
  .date-select:hover, .date-select:focus {
    background: rgba(255,255,255,.18);
    border-color: var(--header-accent);
  }
  .date-select option { background: #1a237e; color: #fff; }

  .btn-nav {
    background: rgba(255,255,255,.1);
    border: 1px solid rgba(255,255,255,.22);
    border-radius: 7px;
    color: rgba(255,255,255,.8);
    font-size: 1rem; width: 32px; height: 32px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background .2s, border-color .2s;
  }
  .btn-nav:hover { background: rgba(255,255,255,.22); border-color: var(--header-accent); color: #fff; }
  .btn-nav:disabled { opacity: .25; cursor: not-allowed; }

  .btn-refresh {
    background: rgba(66,165,245,.18);
    border: 1px solid rgba(66,165,245,.4);
    border-radius: 7px;
    color: var(--header-accent);
    font-family: 'Chakra Petch', monospace;
    font-size: .72rem; padding: 6px 12px;
    cursor: pointer; letter-spacing: .5px;
    transition: background .2s; white-space: nowrap;
  }
  .btn-refresh:hover { background: rgba(66,165,245,.32); }

  /* ── Main content ── */
  .main { padding: 18px 24px; }

  /* ── Section title ── */
  .section-title {
    font-family: 'Chakra Petch', sans-serif;
    font-size: .95rem;
    font-weight: 700;
    color: var(--blue);
    letter-spacing: .3px;
    margin-bottom: 12px;
    padding-bottom: 6px;
    border-bottom: 2px solid #e3e8f0;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::before {
    content: '';
    width: 4px; height: 18px;
    background: linear-gradient(180deg, var(--blue), var(--header-accent));
    border-radius: 2px;
    flex-shrink: 0;
  }

  /* ── Charts row ── */
  .charts-row {
    display: grid;
    grid-template-columns: 1fr 300px;
    gap: 16px;
    align-items: stretch;
  }

  /* ── Card ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: var(--shadow);
    padding: 18px 20px;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--blue), var(--header-accent));
    border-radius: 12px 12px 0 0;
  }

  /* ── Bar chart ── */
  .bar-chart-title {
    font-family: 'Chakra Petch', sans-serif;
    font-size: .88rem; font-weight: 700;
    color: var(--text); text-align: center;
    margin-bottom: 4px; letter-spacing: .3px;
  }

  .bar-canvas-wrap {
    flex: 1;
    min-height: 0;
    position: relative;
  }

  canvas { display: block; width: 100% !important; }

  /* ── Legend ── */
  .legend {
    display: flex; gap: 14px; flex-wrap: wrap;
    margin-top: 10px; justify-content: center;
  }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: .75rem; color: var(--label); font-weight: 600; }
  .legend-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }

  /* ── Overlay ── */
  .overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(255,255,255,.88); border-radius: 12px;
    gap: 10px; z-index: 10;
  }
  .overlay.hidden { display: none; }
  .spinner {
    width: 30px; height: 30px;
    border: 3px solid #e3e8f0;
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin .75s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .overlay-msg {
    font-family: 'Chakra Petch', sans-serif;
    font-size: .7rem; color: var(--muted);
    letter-spacing: 1px; text-align: center;
  }

  /* ── Pie card ── */
  .pie-card {
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .pie-title {
    font-family: 'Chakra Petch', sans-serif;
    font-size: .88rem; font-weight: 700;
    color: var(--text); text-align: center;
    margin-bottom: 10px;
  }
  .pie-wrap {
    position: relative; width: 160px; height: 160px;
    margin: 0 auto 12px;
    flex-shrink: 0;
  }
  #pieChart { width: 100% !important; height: 100% !important; }

  .total-box {
    text-align: center;
    border-top: 1px solid var(--border);
    padding-top: 12px;
    margin-top: 4px;
  }
  .total-label {
    font-family: 'Chakra Petch', sans-serif;
    font-size: .68rem; color: var(--muted);
    letter-spacing: 1.5px; text-transform: uppercase;
    margin-bottom: 4px;
  }
  .total-value {
    font-family: 'Chakra Petch', sans-serif;
    font-size: 1.6rem; font-weight: 700;
    color: var(--blue); letter-spacing: -1px;
  }

  .pie-legend {
    display: flex; flex-direction: column; gap: 5px;
    margin-top: 12px;
  }
  .pie-legend-item {
    display: flex; align-items: center; justify-content: space-between;
    font-size: .73rem; color: var(--label);
    padding: 3px 0;
    border-bottom: 1px solid #f0f2f5;
  }
  .pie-legend-left { display: flex; align-items: center; gap: 7px; font-weight: 600; }
  .pie-legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .pie-legend-val { font-family: 'Chakra Petch', sans-serif; font-weight: 700; color: var(--text); font-size: .75rem; }

  /* ── Stats row ── */
  .stats-row {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 12px; margin-top: 14px;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    position: relative; overflow: hidden;
    box-shadow: var(--shadow);
  }
  .stat-card::after {
    content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
    border-radius: 0 0 10px 10px;
  }
  .stat-card.green::after  { background: linear-gradient(90deg, var(--green), var(--green3)); }
  .stat-card.pink::after   { background: linear-gradient(90deg, var(--purple), var(--pink)); }
  .stat-card.pink2::after  { background: linear-gradient(90deg, var(--pink), var(--pink2)); }

  .stat-label {
    font-family: 'Chakra Petch', sans-serif;
    font-size: .6rem; letter-spacing: 2px; color: var(--muted);
    text-transform: uppercase; margin-bottom: 5px;
  }
  .stat-value { font-family: 'Chakra Petch', sans-serif; font-size: 1.5rem; font-weight: 700; letter-spacing: -1px; line-height: 1; }
  .stat-card.green  .stat-value { color: var(--green); }
  .stat-card.pink   .stat-value { color: var(--purple); }
  .stat-card.pink2  .stat-value { color: var(--pink); }
  .stat-sub { font-size: .67rem; color: var(--muted); margin-top: 3px; }

  /* ── Footer ── */
  .footer-row {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 8px; flex-wrap: wrap; gap: 6px;
  }
  .footer-txt {
    font-family: 'Chakra Petch', monospace;
    font-size: .6rem; color: var(--muted); letter-spacing: .3px;
  }

  /* ── Error ── */
  #errorBanner {
    display: none;
    background: #fff3f3; border: 1px solid #ffcdd2;
    border-radius: 8px; padding: 10px 16px; margin-bottom: 12px;
    font-size: .78rem; color: #c62828; line-height: 1.6;
  }
  #errorBanner code { background: #fce4ec; border-radius: 3px; padding: 1px 5px; font-size: .74rem; }

  @media (max-width: 900px) {
    .charts-row { grid-template-columns: 1fr; }
    .stats-row { grid-template-columns: 1fr; }
    .top-bar { padding: 10px 16px; }
    .main { padding: 12px 14px; }
  }
</style>
</head>
<body>

<!-- ── Top Bar ── -->
<div class="top-bar">
  <div class="top-bar-left">
    <div class="logo-box">BCM<span>·</span>HR</div>
    <div class="top-title">
      Production Dashboard
      <small>Data 1 · Machine Production Per Hour</small>
    </div>
  </div>
  <div class="controls">
    <span class="ctrl-label">Working Date</span>
    <button class="btn-nav" id="btnPrev" disabled>&#8249;</button>
    <select class="date-select" id="datePicker"><option>Loading…</option></select>
    <button class="btn-nav" id="btnNext" disabled>&#8250;</button>
    <button class="btn-refresh" id="btnRefresh">⟳ Refresh</button>
  </div>
</div>

<!-- ── Main ── -->
<div class="main">

  <div id="errorBanner"></div>

  <div class="section-title">Machine Production Per Hour</div>

  <!-- Charts row: bar + pie -->
  <div class="charts-row">

    <!-- Bar chart card -->
    <div class="card" style="min-height:420px;">
      <div class="overlay" id="overlay">
        <div class="spinner"></div>
        <div class="overlay-msg" id="overlayMsg">LOADING DATA…</div>
      </div>
      <div class="bar-canvas-wrap" style="height:360px;">
        <canvas id="bcmChart"></canvas>
      </div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#259b24"></div>CR (BCM)</div>
        <div class="legend-item"><div class="legend-dot" style="background:#7b1fa2"></div>BWE 1</div>
        <div class="legend-item"><div class="legend-dot" style="background:#f48fb1"></div>BWE 2</div>
      </div>
    </div>

    <!-- Pie chart card -->
    <div class="card pie-card" style="min-height:420px;">
      <div class="pie-title">Total Production of Each Machine</div>
      <div class="pie-wrap">
        <canvas id="pieChart"></canvas>
      </div>
      <div class="pie-legend" id="pieLegend"></div>
      <div class="total-box">
        <div class="total-label">Total Production</div>
        <div class="total-value" id="grandTotal">—</div>
      </div>
    </div>

  </div>

  <div class="footer-row">
    <div class="footer-txt" id="rowCount"></div>
    <div class="footer-txt" id="lastUpdate"></div>
  </div>

  <!-- hidden refs for JS -->
  <span id="totalB" style="display:none"></span>
  <span id="totalH" style="display:none"></span>
  <span id="totalI" style="display:none"></span>
  <span id="subB"   style="display:none"></span>
  <span id="subH"   style="display:none"></span>
  <span id="subI"   style="display:none"></span>

</div>

<script>
/* ══════════════════════════════════════════
   CONFIG
   ══════════════════════════════════════════ */
const BASE = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQrCQ3IiMeLNYcvQ-17DHRwXFGJ-giDOeBZ805WbjMJcVjL8OrKt7XspFq-Zf8VLWmLynA0vHBWYvJ8/pub';
const CSV_URLS = [
  BASE + '?gid=1971585139&single=true&output=csv',
  BASE + '?gid=0&single=true&output=csv',
  BASE + '?output=csv',
];
const COL = { DT:0, BCM_CR:1, WDATE:6, BWE1:7, BWE2:8 };

/* ── Colours ── */
const C = {
  cr:   '#2e7d32',
  bwe1: '#7b1fa2',
  bwe2: '#f48fb1',
};

let allRows=[], availableDates=[], bcmChart=null, pieChart=null;

/* ══════════════════════════════════════════
   CHART INIT
   ══════════════════════════════════════════ */
Chart.defaults.font.family = "'Sarabun', sans-serif";

/* ── Bar chart total-label plugin ── */
const totalLabelPlugin = {
  id: 'totalLabel',
  afterDatasetsDraw(chart) {
    const { ctx, scales:{ x, y } } = chart;
    const ds = chart.data.datasets;
    ctx.save();
    chart.data.labels.forEach((_, i) => {
      const total = ds.reduce((s, d) => s + (Number(d.data[i])||0), 0);
      if (!total) return;
      const xp = x.getPixelForValue(i);
      const yp = y.getPixelForValue(total);
      const lbl = total.toLocaleString();
      ctx.font = "bold 10px 'Chakra Petch', monospace";
      const tw = ctx.measureText(lbl).width;
      const pw = tw+8, ph=14, pr=3;
      const px = xp-pw/2, py = yp-ph-3;
      ctx.fillStyle = 'rgba(26,35,126,.82)';
      ctx.beginPath(); ctx.roundRect(px,py,pw,ph,pr); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
      ctx.fillText(lbl, xp, yp-3);
    });
    ctx.restore();
  }
};

function initBarChart() {
  const ctx = document.getElementById('bcmChart').getContext('2d');
  bcmChart = new Chart(ctx, {
    type: 'bar',
    plugins: [totalLabelPlugin],
    data: { labels: [], datasets: [
      { label:'CR (BCM)',  data:[], backgroundColor:'rgba(46,125,50,.85)',  stack:'s', borderRadius:2 },
      { label:'BWE 1',    data:[], backgroundColor:'rgba(123,31,162,.85)', stack:'s', borderRadius:2 },
      { label:'BWE 2',    data:[], backgroundColor:'rgba(244,143,177,.9)', stack:'s', borderRadius:2 },
    ]},
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode:'index', intersect:false },
      layout: { padding:{ top:30 } },
      plugins: {
        legend: { display:false },
        tooltip: {
          backgroundColor: '#fff',
          borderColor: '#dde1e8', borderWidth: 1,
          titleColor: '#1a1f2e', bodyColor: '#374151',
          titleFont: { family:"'Chakra Petch',monospace", size:11, weight:'700' },
          bodyFont: { family:"'Sarabun',sans-serif", size:12 },
          padding: 10,
          callbacks: {
            label: c => ` ${c.dataset.label}: ${c.parsed.y.toLocaleString()}`,
            footer: items => `  Total: ${items.reduce((s,i)=>s+i.parsed.y,0).toLocaleString()}`
          }
        }
      },
      scales: {
        x: {
          stacked: true,
          grid: { color:'#f0f2f5' },
          ticks: { font:{family:"'Chakra Petch',monospace",size:10}, color:'#1a1f2e', maxRotation:0, minRotation:0 }
        },
        y: {
          stacked: true,
          grid: { color:'#f0f2f5' },
          ticks: { font:{family:"'Chakra Petch',monospace",size:10}, color:'#6b7280', callback:v=>v.toLocaleString() },
          beginAtZero: true
        }
      }
    }
  });
}

function initPieChart() {
  const ctx = document.getElementById('pieChart').getContext('2d');
  pieChart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: ['CR (BCM)', 'BWE 1', 'BWE 2'],
      datasets: [{
        data: [0, 0, 0],
        backgroundColor: [C.cr, C.bwe1, C.bwe2],
        borderColor: '#fff',
        borderWidth: 2,
        hoverOffset: 8,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: true,
      cutout: '62%',
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#fff',
          borderColor: '#dde1e8', borderWidth: 1,
          titleColor: '#1a1f2e', bodyColor: '#374151',
          titleFont: { family:"'Chakra Petch',monospace", size:11, weight:'700' },
          bodyFont: { family:"'Sarabun',sans-serif", size:12 },
          callbacks: {
            label: c => ` ${c.label}: ${c.parsed.toLocaleString()}`
          }
        }
      }
    }
  });
}

/* ══════════════════════════════════════════
   DATA FETCH & PARSE
   ══════════════════════════════════════════ */
async function fetchData() {
  showOverlay('LOADING DATA…');
  hideError();
  let lastErr = '';
  for (const url of CSV_URLS) {
    try {
      const res = await fetch(url + '&_cb=' + Date.now());
      if (!res.ok) { lastErr = `HTTP ${res.status}`; continue; }
      const text = await res.text();
      if (!text || text.trim().length < 10) { lastErr = 'Empty'; continue; }
      processCSV(text);
      return;
    } catch(e) { lastErr = e.message; }
  }
  showOverlay('โหลดข้อมูลไม่สำเร็จ');
  showError(`ดึงข้อมูลไม่ได้: ${lastErr}`);
}

function parseNum(v) { return parseFloat((v||'0').replace(/,/g,'')) || 0; }

function parseDT(s) {
  s = (s||'').trim();
  if (!s) return new Date(NaN);
  // YYYY-MM-DD H:MM
  let m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})[T ](\d{1,2}):(\d{2})/);
  if (m) return new Date(+m[1], +m[2]-1, +m[3], +m[4], +m[5], 0);
  // DD/MM/YYYY, H:MM
  m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})[,\s]+(\d{1,2}):(\d{2})/);
  if (m) return new Date(+m[3], +m[2]-1, +m[1], +m[4], +m[5], 0);
  return new Date(NaN);
}

function fmtTime(s) {
  const d = parseDT(s);
  if (!d || isNaN(d)) return s;
  return `${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function toYMD(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getWorkingDate(dtStr) {
  const d = parseDT(dtStr);
  if (!d || isNaN(d)) return null;
  if (d.getHours() < 8) {
    const prev = new Date(d);
    prev.setDate(prev.getDate() - 1);
    return toYMD(prev);
  }
  return toYMD(d);
}

function toDisplay(s) {
  const parts = s.split('-');
  return parts.length===3 ? `${parts[2]}-${parts[1]}-${parts[0]}` : s;
}

function processCSV(text) {
  const rows = Papa.parse(text, { skipEmptyLines:true }).data;
  const header = rows[0]||[];

  allRows = rows.slice(1).filter(r => {
    const dt = (r[COL.DT]||'').trim();
    if (!dt || /date|time/i.test(dt)) return false;
    return !isNaN(parseDT(dt));
  });

  allRows.forEach(r => { r._wd = getWorkingDate(r[COL.DT]||''); });
  allRows = allRows.filter(r => r._wd);

  const dateSet = new Set(allRows.map(r => r._wd));
  availableDates = [...dateSet].sort();

  if (!availableDates.length) {
    showOverlay('ไม่พบข้อมูล');
    showError(`Header: <code>${header.slice(0,6).join(' | ')}</code>`);
    return;
  }

  buildPicker();
  renderForDate(availableDates[availableDates.length - 1]);

  const now = new Date();
  document.getElementById('lastUpdate').textContent =
    `Updated: ${now.toLocaleDateString('en-GB')} ${now.toLocaleTimeString('en-GB')}`;
  document.getElementById('rowCount').textContent =
    `${allRows.length} rows · ${availableDates.length} dates`;
}

/* ══════════════════════════════════════════
   RENDER
   ══════════════════════════════════════════ */
function renderForDate(wd) {
  function shiftHour(r) {
    const h = parseDT(r[COL.DT]).getHours();
    return h < 8 ? h + 24 : h;
  }

  const rows = allRows
    .filter(r => r._wd === wd)
    .sort((a,b) => shiftHour(a) - shiftHour(b));

  const labels = rows.map(r => fmtTime(r[COL.DT]||''));
  const dataB  = rows.map(r => parseNum(r[COL.BCM_CR]));
  const dataH  = rows.map(r => parseNum(r[COL.BWE1]));
  const dataI  = rows.map(r => parseNum(r[COL.BWE2]));

  // Update bar chart
  bcmChart.data.labels           = labels;
  bcmChart.data.datasets[0].data = dataB;
  bcmChart.data.datasets[1].data = dataH;
  bcmChart.data.datasets[2].data = dataI;
  bcmChart.update();

  const sum = a => a.reduce((s,v) => s+v, 0);
  const sB = sum(dataB), sH = sum(dataH), sI = sum(dataI);
  const grand = sB + sH + sI;

  // Update pie chart
  pieChart.data.datasets[0].data = [sB, sH, sI];
  pieChart.update();

  // Pie legend
  const colours = [C.cr, C.bwe1, C.bwe2];
  const pieLabels = ['CR (BCM)', 'BWE 1', 'BWE 2'];
  const pieVals   = [sB, sH, sI];
  const legendEl  = document.getElementById('pieLegend');
  legendEl.innerHTML = pieLabels.map((lbl,i) => `
    <div class="pie-legend-item">
      <div class="pie-legend-left">
        <div class="pie-legend-dot" style="background:${colours[i]}"></div>
        ${lbl}
      </div>
      <div class="pie-legend-val">${pieVals[i].toLocaleString()}</div>
    </div>
  `).join('');

  document.getElementById('grandTotal').textContent = grand.toLocaleString();

  // Stats
  const disp = toDisplay(wd);
  document.getElementById('totalB').textContent = sB.toLocaleString();
  document.getElementById('totalH').textContent = sH.toLocaleString();
  document.getElementById('totalI').textContent = sI.toLocaleString();
  document.getElementById('subB').textContent = `Column B · ${disp}`;
  document.getElementById('subH').textContent = `Column H · ${disp}`;
  document.getElementById('subI').textContent = `Column I · ${disp}`;
  document.getElementById('rowCount').textContent =
    `${rows.length} rows · ${availableDates.length} dates · ${disp}`;

  hideOverlay(); syncNav();
}

/* ══════════════════════════════════════════
   UI HELPERS
   ══════════════════════════════════════════ */
function buildPicker() {
  const sel = document.getElementById('datePicker');
  sel.innerHTML = '';
  availableDates.forEach(d => {
    const o = document.createElement('option');
    o.value = d; o.textContent = toDisplay(d);
    sel.appendChild(o);
  });
  sel.value = availableDates[availableDates.length - 1];
  syncNav();
}

function syncNav() {
  const idx = availableDates.indexOf(document.getElementById('datePicker').value);
  document.getElementById('btnPrev').disabled = idx <= 0;
  document.getElementById('btnNext').disabled = idx >= availableDates.length - 1;
}

document.getElementById('datePicker').addEventListener('change', e => renderForDate(e.target.value));
document.getElementById('btnPrev').addEventListener('click', () => {
  const sel = document.getElementById('datePicker');
  const idx = availableDates.indexOf(sel.value);
  if (idx > 0) { sel.value = availableDates[idx-1]; renderForDate(sel.value); }
});
document.getElementById('btnNext').addEventListener('click', () => {
  const sel = document.getElementById('datePicker');
  const idx = availableDates.indexOf(sel.value);
  if (idx < availableDates.length-1) { sel.value = availableDates[idx+1]; renderForDate(sel.value); }
});
document.getElementById('btnRefresh').addEventListener('click', fetchData);

function showOverlay(msg) {
  document.getElementById('overlayMsg').textContent = msg;
  document.getElementById('overlay').classList.remove('hidden');
}
function hideOverlay() { document.getElementById('overlay').classList.add('hidden'); }
function showError(html) {
  const b = document.getElementById('errorBanner');
  b.innerHTML = '⚠️ ' + html; b.style.display = 'block';
}
function hideError() { document.getElementById('errorBanner').style.display = 'none'; }

/* ══════════════════════════════════════════
   BOOT
   ══════════════════════════════════════════ */
initBarChart();
initPieChart();
fetchData();
</script>
</body>
</html>
