name: 📊 Dashboard → Telegram (Hourly)

on:
  schedule:
    # ทุกชั่วโมง ที่นาทีที่ 6 (UTC) → ตรงกับ :06 ของทุกชั่วโมงตาม GMT+7
    # 00:06 UTC = 07:06 ICT, 01:06 UTC = 08:06 ICT, ..., 16:06 UTC = 23:06 ICT
    - cron: '6 * * * *'

  # สามารถ Run ด้วยตนเองได้
  workflow_dispatch:
    inputs:
      override_date:
        description: 'วันที่ที่ต้องการ (DD-MM-YYYY) หากต้องการ override อัตโนมัติ'
        required: false
        default: ''

jobs:
  send-dashboard:
    name: 📸 Capture & Send Dashboard
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # ─── 1. Checkout ───────────────────────────────────────────────────────
      - name: 📂 Checkout repository
        uses: actions/checkout@v4

      # ─── 2. Python ──────────────────────────────────────────────────────────
      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ─── 3. Dependencies ────────────────────────────────────────────────────
      - name: 📦 Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install playwright pytz requests pillow

      # ─── 4. Playwright browsers ─────────────────────────────────────────────
      - name: 🌐 Install Playwright Chromium
        run: python -m playwright install chromium --with-deps

      # ─── 5. Run script ──────────────────────────────────────────────────────
      - name: 📊 Capture Dashboard & Send to Telegram
        env:
          DASHBOARD_URL: 'https://ithcvopt-del.github.io/Production-Seng/'
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OVERRIDE_DATE: ${{ github.event.inputs.override_date }}
        run: python scripts/send_dashboard.py

      # ─── 6. Upload screenshot as artifact (debug) ───────────────────────────
      - name: 🖼️ Upload screenshot artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-screenshot-${{ github.run_id }}
          path: /tmp/dashboard_*.png
          retention-days: 3
