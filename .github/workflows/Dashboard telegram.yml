name: Dashboard Telegram

on:
  schedule:
    - cron: '6 * * * *'
  workflow_dispatch:

jobs:
  send-dashboard:
    runs-on: self-hosted
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Python dependencies
        shell: cmd
        run: |
          pip install playwright pytz requests pillow --quiet

      - name: Install Playwright Chromium
        shell: cmd
        run: |
          python -m playwright install chromium

      - name: Capture and Send to Telegram
        shell: cmd
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python scripts/send_dashboard.py

      - name: Upload screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-${{ github.run_id }}
          path: ${{ github.workspace }}\screenshot_*.png
          retention-days: 3
          if-no-files-found: ignore
