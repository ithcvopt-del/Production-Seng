name: Dashboard Telegram

on:
  schedule:
    - cron: '6 * * * *'
  workflow_dispatch:

jobs:
  send-dashboard:
    runs-on: self-hosted
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Python dependencies
        run: pip install playwright pytz requests pillow

      - name: Install Playwright Chromium
        run: python -m playwright install chromium

      - name: Capture and Send to Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/send_dashboard.py

      - name: Upload screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-${{ github.run_id }}
          path: C:\Windows\Temp\dashboard_*.png
          retention-days: 3
