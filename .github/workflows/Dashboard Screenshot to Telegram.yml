name: Dashboard Screenshot to Telegram

on:
  schedule:
    - cron: "6 * * * *"
  workflow_dispatch:

jobs:
  send-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install requests playwright

      - name: Install Playwright browsers + system deps  # ✅ แยก step ชัดเจน
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Run screenshot & send
        env:
          TELEGRAM_TOKEN: ${{8850634904:AAEiWQmAJP_He7-FGWBGcuB65valtl8fc08}}
          TELEGRAM_CHAT_ID: ${{-1003993703369}}
        run: python screenshot_telegram.py
